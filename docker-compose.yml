services:
  mongodb:
    image: mongo:7
    container_name: smart-ai-mongodb
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smart-ai-redis
    restart: unless-stopped

    command: redis-server --appendonly yes

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Smart_AI_backend
      dockerfile: Dockerfile

    container_name: smart-ai-backend
    restart: unless-stopped

    env_file:
      - ./Smart_AI_backend/.env.docker

    environment:
      NODE_ENV: production
      PORT: 5000

      MONGO_CONNECTION_STRING: mongodb://mongodb:27017/smart_ai

      REDIS_URL: redis://redis:6379

    depends_on:
      mongodb:
        condition: service_healthy

      redis:
        condition: service_healthy

    ports:
      - "5000:5000"

    volumes:
      - ./Smart_AI_backend/uploads:/app/uploads

  frontend:
    build:
      context: ./Smart_AI_frontend
      dockerfile: Dockerfile

      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}

    container_name: smart-ai-frontend
    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "3000:80"

volumes:
  mongo_data:
  redis_data:
