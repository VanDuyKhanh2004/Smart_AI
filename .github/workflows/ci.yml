name: CI

on:
  push:
    branches: [main]
    paths:
      - Smart_AI_backend/**
      - Smart_AI_frontend/**
      - .github/workflows/ci.yml
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Smart_AI_backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Smart_AI_backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test

  frontend-typecheck-tests-build:
    name: Frontend Type Check, Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Smart_AI_frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Smart_AI_frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run frontend tests
        run: npx vitest run

      - name: Build frontend
        run: npm run build
