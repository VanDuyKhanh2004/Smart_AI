name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]
    paths:
      - Smart_AI_frontend/**

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    # Vercel CLI reads these to link the project without needing .vercel/project.json
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Smart_AI_frontend/package-lock.json

      - name: Install latest Vercel CLI
        run: npm install --global vercel@latest

      # Vercel commands run from the repository root (no working-directory override).
      # The Vercel project dashboard has Root Directory = Smart_AI_frontend.
      # Vercel CLI resolves Smart_AI_frontend relative to the current directory,
      # so running from the repo root produces the correct absolute path.
      # Do NOT set working-directory on Vercel steps — that would double-nest
      # to Smart_AI_frontend/Smart_AI_frontend and cause "spawn sh ENOENT".
      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
